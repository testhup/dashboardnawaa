<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نوا · مركز القيادة التسويقي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F6F5FC;
  --surface:#FFFFFF;
  --surface-2:#FAF9FE;
  --ink:#1C2046;
  --ink-soft:#3A3F6B;
  --muted:#757CA3;
  --muted-2:#9DA2C0;
  --line:#E8E6F4;
  --line-2:#F1EFFA;
  --primary:#5E3FB0;
  --primary-deep:#492F8E;
  --primary-soft:#ECE7F8;
  --teal:#4F46B5;
  --teal-soft:#E9E8FA;
  --coral:#C9A24B;
  --coral-soft:#F7EFD9;
  --amber:#C9A24B;
  --amber-soft:#F7EFD9;
  --green:#2E9E6B;
  --green-soft:#E3F4EC;
  --red:#D85C5C;
  --red-soft:#FBE7E7;
  --blue:#4F6FD0;
  --blue-soft:#E8EDFB;
  --purple:#7C5FD0;
  --purple-soft:#EFEAFB;
  --gray:#8A90A2;
  --gray-soft:#EDEDF3;
  --shadow-sm:0 1px 2px rgba(28,32,70,.06),0 1px 3px rgba(28,32,70,.05);
  --shadow:0 4px 14px rgba(28,32,70,.09),0 2px 6px rgba(28,32,70,.05);
  --shadow-lg:0 18px 50px rgba(46,30,110,.20),0 6px 18px rgba(28,32,70,.10);
  --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:22px;
  --sidebar-w:264px;
  --font:"Cairo","Segoe UI",system-ui,sans-serif;
  --num:"Inter","Cairo",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--canvas);
  color:var(--ink);
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#D9D7D0;border-radius:20px;border:3px solid var(--canvas)}
::-webkit-scrollbar-thumb:hover{background:#C4C2BA}
.num{font-family:var(--num);font-feature-settings:"tnum"}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--r-sm);font-weight:600;font-size:13px;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);transition:.15s;white-space:nowrap}
.btn:hover{background:var(--surface-2);border-color:#DEDCD5}
.btn:active{transform:translateY(1px)}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-deep);border-color:var(--primary-deep)}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--line-2)}
.btn-danger{color:var(--red);border-color:var(--red-soft);background:var(--red-soft)}
.btn-danger:hover{background:#f8dada}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-icon{padding:8px;border-radius:var(--r-sm)}
.btn-icon svg{width:17px;height:17px;display:block}

/* ---------- auth ---------- */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1200px 600px at 80% -10%,#ECECFB 0%,transparent 55%),radial-gradient(900px 500px at -10% 110%,#E1F4F1 0%,transparent 50%),var(--canvas)}
.auth-card{width:100%;max-width:410px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:38px 34px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.auth-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#5E3FB0,#8B5BD6);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 16px rgba(91,91,214,.35)}
.auth-mark svg{width:22px;height:22px}
.auth-card h1{font-size:21px;font-weight:800;letter-spacing:-.3px}
.auth-card .sub{color:var(--muted);font-size:13px;margin:4px 0 26px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);transition:.15s}
.input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px var(--primary-soft)}
textarea.input{resize:vertical;min-height:84px;line-height:1.6}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.auth-switch button{color:var(--primary);font-weight:700}
.auth-err{background:var(--red-soft);color:#B23A3A;font-size:12.5px;padding:9px 12px;border-radius:8px;margin-bottom:14px;font-weight:600}
.auth-hint{font-size:11.5px;color:var(--muted-2);text-align:center;margin-top:16px;line-height:1.7}

/* ---------- layout ---------- */
#app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-inline-end:1px solid var(--line);
  display:flex;flex-direction:column;position:fixed;inset-block:0;inset-inline-start:0;z-index:40;transition:transform .25s}
.sb-head{padding:18px 16px 14px;display:flex;align-items:center;gap:10px}
.sb-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#5E3FB0,#8B5BD6);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.sb-mark svg{width:18px;height:18px}
.sb-title{font-weight:800;font-size:14.5px;letter-spacing:-.2px;line-height:1.25}
.sb-title span{display:block;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0}
.sb-search{margin:4px 12px 10px;position:relative}
.sb-search svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted-2)}
.sb-search input{width:100%;padding:9px 34px 9px 12px;border:1px solid var(--line);background:var(--surface-2);border-radius:9px;font-size:13px}
.sb-search input:focus{outline:none;border-color:var(--primary);background:#fff}
.sb-section{padding:6px 12px;display:flex;align-items:center;justify-content:space-between}
.sb-section span{font-size:11px;font-weight:700;color:var(--muted-2);letter-spacing:.4px;text-transform:uppercase}
.sb-section button{color:var(--muted);padding:3px;border-radius:6px}
.sb-section button:hover{background:var(--line-2);color:var(--primary)}
.sb-list{flex:1;overflow-y:auto;padding:0 8px 10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:.12s;position:relative}
.sb-item:hover{background:var(--line-2)}
.sb-item.active{background:var(--primary-soft)}
.sb-item.active .sb-name{color:var(--primary-deep);font-weight:700}
.sb-logo{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.sb-name{font-size:13.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-home{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;margin:0 8px 4px;font-weight:600;font-size:13.5px;color:var(--ink-soft);cursor:pointer}
.sb-home:hover{background:var(--line-2)}
.sb-home.active{background:var(--primary-soft);color:var(--primary-deep)}
.sb-home svg{width:17px;height:17px}
.sb-foot{border-top:1px solid var(--line);padding:10px 12px}
.sb-user{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px;cursor:pointer}
.sb-user:hover{background:var(--line-2)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4F46B5,#7C5FD0);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.sb-user-name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-name span{display:block;font-size:11px;color:var(--muted);font-weight:400}

.main{flex:1;margin-inline-start:var(--sidebar-w);min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:30}
.hamburger{display:none}
.topbar-title{font-weight:800;font-size:16px;flex:1;letter-spacing:-.2px;display:flex;align-items:center;gap:10px;min-width:0}
.topbar-title .tt-logo{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.topbar-title .tt-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gsearch{position:relative;width:300px;max-width:38vw}
.gsearch svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted-2)}
.gsearch input{width:100%;padding:9px 34px 9px 12px;border:1px solid var(--line);background:var(--surface-2);border-radius:9px;font-size:13px}
.gsearch input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px var(--primary-soft)}
.content{padding:24px;max-width:1280px;width:100%;margin:0 auto;flex:1}

/* ---------- home ---------- */
.home-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.home-head h2{font-size:24px;font-weight:800;letter-spacing:-.5px}
.home-head p{color:var(--muted);font-size:13.5px;margin-top:2px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.co-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:0;overflow:hidden;cursor:pointer;transition:.18s;position:relative}
.co-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:#E0DED7}
.co-spine{height:5px;width:100%}
.co-body{padding:18px}
.co-top{display:flex;align-items:center;gap:12px;margin-bottom:15px}
.co-logo{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;flex-shrink:0}
.co-name{font-weight:800;font-size:16px;letter-spacing:-.2px;line-height:1.3}
.co-meta{font-size:12px;color:var(--muted);margin-top:1px}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.status-pill .d{width:6px;height:6px;border-radius:50%}
.co-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-2)}
.co-stat{text-align:center}
.co-stat .v{font-family:var(--num);font-weight:700;font-size:17px;color:var(--ink)}
.co-stat .l{font-size:10.5px;color:var(--muted);margin-top:1px}
.co-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:13px}
.add-co-card{background:transparent;border:2px dashed var(--line);border-radius:var(--r-lg);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--muted);transition:.16s}
.add-co-card:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.add-co-card .plus{width:46px;height:46px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.add-co-card:hover .plus{border-color:var(--primary);background:#fff}
.add-co-card svg{width:22px;height:22px}

.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--gray-soft);color:var(--ink-soft)}

/* ---------- company view ---------- */
.co-header{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.co-header .ch-logo{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;flex-shrink:0}
.co-header h2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.co-header .ch-meta{display:flex;align-items:center;gap:10px;margin-top:3px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
.co-header .spacer{flex:1}
.tabs-bar{display:flex;align-items:center;gap:3px;margin:18px 0 18px;border-bottom:1px solid var(--line);overflow-x:auto;padding-bottom:0}
.tab-chip{display:flex;align-items:center;gap:7px;padding:9px 13px;border-radius:9px 9px 0 0;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s;position:relative}
.tab-chip:hover{color:var(--ink-soft);background:var(--line-2)}
.tab-chip.active{color:var(--primary-deep);border-bottom-color:var(--primary)}
.tab-chip svg.ti{width:15px;height:15px;opacity:.85}
.tab-chip .tab-menu-btn{opacity:0;padding:1px;border-radius:5px;margin-inline-start:2px}
.tab-chip:hover .tab-menu-btn,.tab-chip.active .tab-menu-btn{opacity:.6}
.tab-chip .tab-menu-btn:hover{opacity:1;background:var(--line)}
.tab-chip.dragging{opacity:.4}
.tab-chip.drop-target{background:var(--primary-soft)}
.add-tab-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--muted);border-radius:8px;white-space:nowrap}
.add-tab-btn:hover{background:var(--primary-soft);color:var(--primary)}
.add-tab-btn svg{width:15px;height:15px}

/* ---------- kpi ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;position:relative;overflow:hidden}
.kpi .kpi-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kpi .kpi-ico svg{width:18px;height:18px}
.kpi .kpi-v{font-family:var(--num);font-weight:700;font-size:25px;letter-spacing:-.5px;color:var(--ink);line-height:1.1}
.kpi .kpi-l{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500}
.kpi .kpi-sub{font-size:11.5px;font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:3px}

.section-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:18px;overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line-2);gap:12px;flex-wrap:wrap}
.section-head h3{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.section-head h3 svg{width:17px;height:17px;color:var(--muted)}
.section-body{padding:18px}

/* ---------- toolbar ---------- */
.tbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tbar .grow{flex:1}
.mini-search{position:relative}
.mini-search svg{position:absolute;inset-inline-start:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted-2)}
.mini-search input{padding:8px 30px 8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:13px;width:200px}
.mini-search input:focus{outline:none;border-color:var(--primary);background:#fff}
.filter-sel{padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer}
.filter-sel:focus{outline:none;border-color:var(--primary)}

/* ---------- table ---------- */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
table.dt{width:100%;border-collapse:collapse;font-size:13px;min-width:max-content}
table.dt th{text-align:start;padding:11px 13px;font-size:11.5px;font-weight:700;color:var(--muted);background:var(--surface-2);border-bottom:1px solid var(--line);white-space:nowrap;position:relative}
table.dt th.add-field-th{width:42px;text-align:center}
table.dt td{padding:10px 13px;border-bottom:1px solid var(--line-2);vertical-align:middle;white-space:nowrap;max-width:280px;overflow:hidden;text-overflow:ellipsis}
table.dt tr:last-child td{border-bottom:none}
table.dt tbody tr{transition:.1s}
table.dt tbody tr:hover{background:var(--surface-2)}
table.dt tr.archived-row{opacity:.5}
.cell-link{color:var(--primary);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.cell-link svg{width:13px;height:13px}
.cell-muted{color:var(--muted-2)}
.cell-num{font-family:var(--num);font-weight:600}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:6px}
.badge .bd{width:6px;height:6px;border-radius:50%}
.row-actions{display:flex;gap:2px;opacity:0;transition:.1s}
tr:hover .row-actions{opacity:1}
.row-actions button{padding:5px;border-radius:6px;color:var(--muted)}
.row-actions button:hover{background:var(--line);color:var(--ink)}
.row-actions button.del:hover{background:var(--red-soft);color:var(--red)}
.row-actions svg{width:15px;height:15px;display:block}
.add-field-btn{color:var(--muted);padding:5px;border-radius:6px}
.add-field-btn:hover{background:var(--primary-soft);color:var(--primary)}
.field-th-menu{cursor:pointer}
.field-th-menu:hover{color:var(--ink)}

/* ---------- links ---------- */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.link-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;display:flex;gap:11px;transition:.14s;position:relative}
.link-card:hover{box-shadow:var(--shadow-sm);border-color:#E0DED7}
.link-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-ico svg{width:17px;height:17px}
.link-info{flex:1;min-width:0}
.link-title{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-url{font-size:12px;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.link-note{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
.link-cat{font-size:10.5px;font-weight:700;color:var(--muted-2);margin-top:5px;text-transform:uppercase;letter-spacing:.3px}
.link-actions{position:absolute;inset-block-start:8px;inset-inline-end:8px;display:flex;gap:1px;opacity:0;transition:.1s}
.link-card:hover .link-actions{opacity:1}
.link-actions button{padding:4px;border-radius:6px;color:var(--muted-2);background:rgba(255,255,255,.8)}
.link-actions button:hover{background:var(--line);color:var(--ink)}
.link-actions svg{width:14px;height:14px;display:block}

/* ---------- notes ---------- */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.note-card{border-radius:var(--r);padding:15px;border:1px solid var(--line);position:relative;min-height:120px}
.note-card .note-title{font-weight:800;font-size:14px;margin-bottom:6px}
.note-card .note-body{font-size:13px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.65}
.note-card .note-date{font-size:11px;color:var(--muted-2);margin-top:10px}
.note-actions{position:absolute;inset-block-start:10px;inset-inline-end:10px;display:flex;gap:1px;opacity:0;transition:.1s}
.note-card:hover .note-actions{opacity:1}
.note-actions button{padding:4px;border-radius:6px;color:var(--muted)}
.note-actions button:hover{background:rgba(0,0,0,.06)}
.note-actions svg{width:14px;height:14px;display:block}

/* ---------- report ---------- */
.report-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.report-sheet{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;max-width:820px}
.rep-head{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:16px;margin-bottom:22px;gap:14px;flex-wrap:wrap}
.rep-head h2{font-size:20px;font-weight:800}
.rep-head .rep-co{display:flex;align-items:center;gap:10px}
.rep-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.rep-kpi{border:1px solid var(--line);border-radius:var(--r);padding:14px}
.rep-kpi .v{font-family:var(--num);font-weight:700;font-size:22px}
.rep-kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
.rep-section{margin-bottom:22px}
.rep-section h4{font-size:13.5px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.rep-best{border-inline-start:3px solid var(--green);background:var(--green-soft);padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:8px}
.rep-worst{border-inline-start:3px solid var(--red);background:var(--red-soft);padding:12px 14px;border-radius:0 8px 8px 0}
.rep-best .t,.rep-worst .t{font-weight:800;font-size:13px}
.rep-best .s,.rep-worst .s{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* ---------- empty ---------- */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .e-ico{width:64px;height:64px;border-radius:18px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty .e-ico svg{width:28px;height:28px;color:var(--primary)}
.empty h3{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:5px}
.empty p{font-size:13px;max-width:320px;margin:0 auto 16px;line-height:1.7}

/* ---------- side panel ---------- */
.overlay{position:fixed;inset:0;background:rgba(32,36,46,.42);backdrop-filter:blur(2px);z-index:60;opacity:0;transition:opacity .2s}
.overlay.show{opacity:1}
.panel{position:fixed;inset-block:0;inset-inline-end:0;width:440px;max-width:94vw;background:var(--surface);z-index:61;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.32,.72,0,1)}
html[dir=rtl] .panel{transform:translateX(-100%)}
.panel.show{transform:translateX(0)!important}
.panel-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel-head h3{font-size:16px;font-weight:800}
.panel-body{flex:1;overflow-y:auto;padding:20px 22px}
.panel-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;background:var(--surface-2)}
.close-x{padding:7px;border-radius:8px;color:var(--muted)}
.close-x:hover{background:var(--line-2);color:var(--ink)}
.close-x svg{width:18px;height:18px;display:block}

/* ---------- modal ---------- */
.modal{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg{position:absolute;inset:0;background:rgba(32,36,46,.45);backdrop-filter:blur(2px)}
.modal-card{position:relative;background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:440px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:pop .2s}
.modal-card.wide{max-width:560px}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line-2)}
.modal-head h3{font-size:17px;font-weight:800}
.modal-head p{font-size:12.5px;color:var(--muted);margin-top:2px}
.modal-body{padding:20px 22px;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line-2);display:flex;gap:9px;justify-content:flex-end}

/* ---------- choice grid ---------- */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{border:1.5px solid var(--line);border-radius:var(--r);padding:14px;cursor:pointer;transition:.14s;text-align:center}
.choice:hover{border-color:var(--primary);background:var(--primary-soft)}
.choice.sel{border-color:var(--primary);background:var(--primary-soft)}
.choice .c-ico{width:38px;height:38px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.choice.sel .c-ico,.choice:hover .c-ico{background:#fff}
.choice .c-ico svg{width:19px;height:19px;color:var(--primary)}
.choice .c-name{font-size:12.5px;font-weight:700}
.choice .c-desc{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4}

/* color/emoji pickers */
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.1s}
.swatch.sel{border-color:var(--ink);transform:scale(1.08)}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap}
.emoji-pick{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;background:var(--surface-2)}
.emoji-pick.sel{border-color:var(--primary);background:var(--primary-soft)}

/* tags input */
.tags-input{display:flex;flex-wrap:wrap;gap:6px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:var(--surface-2);min-height:40px;align-items:center}
.tags-input input{border:none;background:transparent;flex:1;min-width:80px;font-size:13px;outline:none}
.tag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--primary-soft);color:var(--primary-deep);font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:6px}
.tag-chip button{color:var(--primary-deep);opacity:.6;display:flex}
.tag-chip button:hover{opacity:1}
.tag-chip svg{width:11px;height:11px}

/* dropdown menu */
.menu{position:fixed;z-index:80;background:var(--surface);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow-lg);padding:5px;min-width:180px;animation:pop .12s}
.menu button{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-soft);text-align:start}
.menu button:hover{background:var(--line-2)}
.menu button.danger{color:var(--red)}
.menu button.danger:hover{background:var(--red-soft)}
.menu button svg{width:15px;height:15px;flex-shrink:0;color:var(--muted)}
.menu button.danger svg{color:var(--red)}
.menu .sep{height:1px;background:var(--line-2);margin:5px 4px}

/* quick add fab */
#fab{position:fixed;inset-block-end:26px;inset-inline-end:26px;width:54px;height:54px;border-radius:50%;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(91,91,214,.45);z-index:50;transition:.18s}
#fab:hover{background:var(--primary-deep);transform:scale(1.06)}
#fab svg{width:24px;height:24px}

/* toast */
#toast-root{position:fixed;inset-block-end:24px;inset-inline-start:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
html[dir=rtl] #toast-root{transform:translateX(50%)}
.toast{background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;animation:toastin .25s}
.toast svg{width:16px;height:16px;color:#7CE0B8}
@keyframes toastin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* global search results */
.gsr{padding:6px;position:absolute;top:calc(100% + 8px);inset-inline-start:0;width:min(420px,92vw);max-height:60vh;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:60}
.gsr-group-h{font-size:11px;font-weight:700;color:var(--muted-2);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px 5px}
.gsr-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer}
.gsr-item:hover{background:var(--line-2)}
.gsr-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;color:#fff;font-size:12px}
.gsr-main{flex:1;min-width:0}
.gsr-t{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gsr-s{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider-lbl{font-size:11px;font-weight:700;color:var(--muted-2);text-transform:uppercase;letter-spacing:.4px;margin:18px 0 10px;border-top:1px solid var(--line-2);padding-top:14px}

/* print */
#print-area{display:none}
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{display:block;position:absolute;inset:0;padding:0;background:#fff}
  @page{margin:14mm}
}

/* responsive */
@media(max-width:880px){
  .sidebar{transform:translateX(100%)}
  html[dir=rtl] .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)!important}
  .main{margin-inline-start:0}
  .hamburger{display:flex}
  .gsearch{width:auto;flex:1}
  .content{padding:16px}
  .form-row{grid-template-columns:1fr}
  .choice-grid{grid-template-columns:1fr}
}
.sb-backdrop{display:none}
@media(max-width:880px){.sb-backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:39}}
.hide{display:none!important}
</style>

function openMenu(x,y,items){closeMenu();const m=document.createElement('div');m.className='menu';m.style.visibility='hidden';
 m.innerHTML=items.map(it=>it.sep?'<div class="sep"></div>':`<button class="${it.danger?'danger':''}" data-k="${it.k}">${svg(it.icon)}<span>${esc(it.label)}</span></button>`).join('');
 $('#menu-root').appendChild(m);
 const r=m.getBoundingClientRect();let px=x,py=y;
 if(px+r.width>innerWidth-8)px=innerWidth-r.width-8; if(px<8)px=8;
 if(py+r.height>innerHeight-8)py=Math.max(8,y-r.height);
 m.style.left=px+'px';m.style.top=py+'px';m.style.visibility='visible';
 m.querySelectorAll('button').forEach(b=>b.onclick=()=>{const it=items.find(i=>i.k===b.dataset.k);closeMenu();if(it&&it.onClick)it.onClick();});
 setTimeout(()=>document.addEventListener('mousedown',menuOutside),0);
}

/* ---------------- field input builder ---------------- */
function fieldRow(labelHTML,controlEl){const w=document.createElement('div');w.className='field';if(labelHTML)w.innerHTML=`<label>${labelHTML}</label>`;w.appendChild(controlEl);return w;}
function makeInput(field,value){
 let ctrl,get;
 const t=field.type;
 if(t==='longtext'){ctrl=document.createElement('textarea');ctrl.className='input';ctrl.value=value||'';get=()=>ctrl.value.trim();}
 else if(t==='number'){ctrl=document.createElement('input');ctrl.className='input';ctrl.type='number';ctrl.value=(value??'')===''?'':value;get=()=>ctrl.value===''?'':Number(ctrl.value);}
 else if(t==='date'){ctrl=document.createElement('input');ctrl.className='input';ctrl.type='date';ctrl.value=value||'';get=()=>ctrl.value;}
 else if(t==='dropdown'||t==='status'){ctrl=document.createElement('select');ctrl.className='input';ctrl.innerHTML='<option value="">— اختار —</option>'+(field.options||[]).map(o=>`<option ${o===value?'selected':''}>${esc(o)}</option>`).join('');get=()=>ctrl.value;}
 else if(t==='tags'){const box=document.createElement('div');box.className='tags-input';let tags=Array.isArray(value)?value.slice():(value?String(value).split(',').map(s=>s.trim()).filter(Boolean):[]);
   const inp=document.createElement('input');inp.placeholder='أضف تاغ + Enter';
   function draw(){box.querySelectorAll('.tag-chip').forEach(e=>e.remove());tags.forEach((tg,i)=>{const c=document.createElement('span');c.className='tag-chip';c.innerHTML=`${esc(tg)}<button type="button">${svg('x')}</button>`;c.querySelector('button').onclick=()=>{tags.splice(i,1);draw();};box.insertBefore(c,inp);});}
   inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();const v=inp.value.trim();if(v&&!tags.includes(v)){tags.push(v);inp.value='';draw();}}else if(e.key==='Backspace'&&!inp.value&&tags.length){tags.pop();draw();}};
   box.appendChild(inp);draw();ctrl=box;get=()=>tags.slice();}
 else{ctrl=document.createElement('input');ctrl.className='input';ctrl.type=t==='link'?'url':'text';ctrl.value=value||'';if(t==='link')ctrl.placeholder='https://';get=()=>ctrl.value.trim();}
 const w=fieldRow(esc(field.name),ctrl);w.__get=get;return w;
}

/* ---------------- cell renderer ---------------- */
function cellHTML(field,value,first){
 const t=field.type;
 if(value==null||value===''||(Array.isArray(value)&&!value.length))return '<span class="cell-muted">—</span>';
 if(t==='status'){const c=optColor(value);return `<span class="badge" style="background:${c.bg};color:${c.fg}"><span class="bd" style="background:${c.dot}"></span>${esc(value)}</span>`;}
 if(t==='dropdown'){return `<span class="badge" style="background:var(--gray-soft);color:var(--ink-soft)">${esc(value)}</span>`;}
 if(t==='link'){let u=String(value);if(!/^https?:/i.test(u))u='https://'+u;return `<a class="cell-link" href="${esc(u)}" target="_blank" rel="noopener">${svg('ext')}فتح</a>`;}
 if(t==='number'){return `<span class="cell-num">${fmtNum(value)}</span>`;}
 if(t==='date'){return `<span class="cell-num">${fmtDate(value)}</span>`;}
 if(t==='tags'){const arr=Array.isArray(value)?value:String(value).split(',');return arr.filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join(' ');}
 const txt=esc(value);return first?`<strong>${txt}</strong>`:txt;
}

/* ---------------- find helper tabs ---------------- */
function campaignTab(c){return c.tabs.find(t=>t.type==='table'&&t.fields.some(f=>f.id==='budget')&&t.fields.some(f=>f.id==='leads'));}
function leadTab(c){return c.tabs.find(t=>t.type==='table'&&t.fields.some(f=>f.id==='source')&&t.fields.some(f=>f.id==='status'));}
function num(v){const n=Number(v);return isNaN(n)?0:n;}
function coStats(c){
 const ct=campaignTab(c),lt=leadTab(c);
 const camps=ct?ct.rows.filter(r=>!r.archived):[];
 const active=camps.filter(r=>r.values.status==='نشطة').length;
 const budget=camps.reduce((s,r)=>s+num(r.values.budget),0);
 const campLeads=camps.reduce((s,r)=>s+num(r.values.leads),0);
 const sales=camps.reduce((s,r)=>s+num(r.values.sales),0);
 const crmLeads=lt?lt.rows.filter(r=>!r.archived).length:0;
 const leads=Math.max(campLeads,crmLeads);
 const cpl=campLeads>0?Math.round(budget/campLeads):0;
 return{active,budget,leads:campLeads,crmLeads,sales,cpl,totalLeads:leads};
}

const DB=()=>getDB();

/* ---------- tiny pass hash (NOT real security) ---------- */
function hashPass(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return 'h'+h.toString(36);}
function initials(n){return String(n||'؟').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
 let raw=await Storage.get(KEY);let db=null;
 if(raw){try{db=JSON.parse(raw);}catch(e){db=null;}}
 if(!db||!db.companies){db=seedDB();await Storage.set(KEY,JSON.stringify(db));}
 if(!db.users)db.users=[];if(!db.templates)db.templates=[];if(db.session===undefined)db.session=null;
 setDB(db);
 if(db.session&&db.users.some(u=>u.email===db.session))renderApp();
 else renderAuth();
}

/* ============================================================
   AUTH
   ============================================================ */
let authMode='login';
function renderAuth(){
 const app=$('#app-shell');app.classList.add('hide');$('#fab').classList.add('hide');
 const a=$('#auth');a.style.display='flex';
 const isLogin=authMode==='login';
 a.innerHTML=`<div class="auth-card">
   <div class="auth-logo"><div class="auth-mark">${svg('bolt')}</div>
     <div><h1>نوا · مركز القيادة التسويقي</h1></div></div>
   <p class="sub">${isLogin?'سجّلي دخولك وكملي شغل نوا':'اعملي حساب وابدئي تنظمي كل برامج نوا'}</p>
   <div id="authErr"></div>
   ${isLogin?'':`<div class="field"><label>الاسم</label><input class="input" id="auName" placeholder="كارما"></div>`}
   <div class="field"><label>الإيميل</label><input class="input" id="auEmail" type="email" placeholder="you@email.com"></div>
   <div class="field"><label>الباسورد</label><input class="input" id="auPass" type="password" placeholder="••••••••"></div>
   <button class="btn btn-primary" id="auSubmit" style="width:100%;justify-content:center;margin-top:6px">${isLogin?'دخول':'إنشاء حساب'}</button>
   <div class="auth-switch">${isLogin?'لسه ماعندكيش حساب؟':'عندك حساب؟'} <button id="auSwitch">${isLogin?'اعملي حساب':'سجّلي دخول'}</button></div>
 </div>`;
 $('#auSwitch').onclick=()=>{authMode=isLogin?'signup':'login';renderAuth();};
 const submit=()=>isLogin?doLogin():doSignup();
 $('#auSubmit').onclick=submit;
 a.querySelectorAll('.input').forEach(inp=>inp.onkeydown=e=>{if(e.key==='Enter')submit();});
 (a.querySelector('#auName')||a.querySelector('#auEmail')).focus();
}
function authErr(m){$('#authErr').innerHTML=`<div class="auth-err">${esc(m)}</div>`;}
function doSignup(){
 const name=$('#auName').value.trim(),email=$('#auEmail').value.trim().toLowerCase(),pass=$('#auPass').value;
 if(!name)return authErr('اكتبي اسمك');
 if(!/^\S+@\S+\.\S+$/.test(email))return authErr('الإيميل مش مظبوط');
 if(pass.length<4)return authErr('الباسورد لازم ٤ حروف على الأقل');
 const db=DB();if(db.users.some(u=>u.email===email))return authErr('الإيميل ده مسجّل قبل كده، سجّلي دخول');
 db.users.push({name,email,pass:hashPass(pass),createdAt:Date.now()});
 db.session=email;persistNow();toast('أهلاً بيكي '+name.split(' ')[0]+' 👋');renderApp();
}
function doLogin(){
 const email=$('#auEmail').value.trim().toLowerCase(),pass=$('#auPass').value;
 const db=DB();const u=db.users.find(x=>x.email===email);
 if(!u)return authErr('مفيش حساب بالإيميل ده');
 if(u.pass!==hashPass(pass))return authErr('الباسورد غلط');
 db.session=email;persistNow();toast('نوّرتي 👋');renderApp();
}
function logout(){const db=DB();db.session=null;persistNow();App.view='home';App.companyId=null;App.tabId=null;renderAuth();}

function companyMenu(e,c){const r=e.currentTarget.getBoundingClientRect();

function tabMenu(e,c,tabId){const r=e.currentTarget.getBoundingClientRect();const t=c.tabs.find(x=>x.id===tabId);
 openMenu(r.left,r.bottom+4,[
   {k:'rename',icon:'edit',label:'إعادة تسمية',onClick:()=>renameTab(c,t)},
   {k:'dup',icon:'copy',label:'تكرار السيكشن',onClick:()=>{const copy=JSON.parse(JSON.stringify(t));copy.id=uid();copy.name=t.name+' (نسخة)';
     if(copy.fields)copy.fields.forEach(f=>{});if(copy.rows)copy.rows.forEach(rw=>rw.id=uid());
     const i=c.tabs.findIndex(x=>x.id===t.id);c.tabs.splice(i+1,0,copy);touch(c);save();App.tabId=copy.id;render();}},
   {sep:true},
   {k:'del',icon:'trash',label:'حذف السيكشن',danger:true,onClick:()=>{if(c.tabs.length<=1)return toast('لازم يفضل سيكشن واحد على الأقل',false);
     confirmDelete('حذف السيكشن','هيتشال هو وكل اللي جواه.',()=>{c.tabs=c.tabs.filter(x=>x.id!==t.id);if(App.tabId===t.id)App.tabId=c.tabs[0].id;touch(c);save();render();});}},
 ]);

function renameTab(c,t){modal({title:'إعادة تسمية',build(b){b.innerHTML='';const f=makeInput({type:'text',name:'الاسم'},t.name);b.appendChild(f);setTimeout(()=>f.querySelector('input').focus(),30);b.__f=f;},
   footer:[{label:'إلغاء',onClick:closeModal},{label:'حفظ',primary:true,onClick:(b)=>{const v=b.__f.__get();if(v){t.name=v;touch(c);save();render();}closeModal();}}]});}

/* ---------- duplicate / template ---------- */
function duplicateCompany(c){const copy=JSON.parse(JSON.stringify(c));copy.id=uid();copy.name=c.name+' (نسخة)';copy.createdAt=Date.now();copy.updatedAt=Date.now();
 copy.tabs.forEach(t=>{t.id=uid();if(t.rows)t.rows.forEach(r=>r.id=uid());if(t.links)t.links.forEach(l=>l.id=uid());if(t.notes)t.notes.forEach(n=>n.id=uid());if(t.files)t.files.forEach(f=>f.id=uid());if(t.reports)t.reports.forEach(r=>r.id=uid());});
 DB().companies.push(copy);save();toast('اتعملت نسخة');openCompany(copy.id);}
function saveTemplate(c){const tpl={id:uid(),name:c.name,tabs:JSON.parse(JSON.stringify(c.tabs))};
 tpl.tabs.forEach(t=>{t.id=uid();if(t.rows)t.rows=[];if(t.links)t.links=[];if(t.notes)t.notes=[];if(t.files)t.files=[];if(t.reports)t.reports=[];if(t.kpis)t.kpis=[];if('note'in t)t.note='';});
 DB().templates.push(tpl);save();toast('اتحفظ كـ Template ✅ تقدري تستخدميه في برنامج جديدة');}

/* ============================================================
   TAB DISPATCH
   ============================================================ */
function renderTab(root,c,t){
 if(!t){root.innerHTML='';return;}
 if(t.type==='dashboard')return renderDashboard(root,c,t);
 if(t.type==='table')return renderTable(root,c,t);
 if(t.type==='links')return renderLinks(root,c,t);
 if(t.type==='notes')return renderNotes(root,c,t);
 if(t.type==='files')return renderFiles(root,c,t);
 if(t.type==='report')return renderReport(root,c,t);
 root.innerHTML='<div class="empty"><p>نوع السيكشن مش معروف</p></div>';
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard(root,c,t){
 const s=coStats(c);
 const auto=[
   {l:'حملات نشطة',v:fmtNum(s.active),icon:'mega',col:'var(--primary)',bg:'var(--primary-soft)'},
   {l:'الميزانية المستخدمة',v:fmtNum(s.budget),icon:'dollar',col:'var(--teal)',bg:'var(--teal-soft)'},
   {l:'إجمالي الليدز',v:fmtNum(s.totalLeads),icon:'users',col:'#3F7FD6',bg:'var(--blue-soft)'},
   {l:'المبيعات / التحويلات',v:fmtNum(s.sales),icon:'trend',col:'#2E9E6B',bg:'var(--green-soft)'},
   {l:'متوسط تكلفة الليد',v:s.cpl?fmtNum(s.cpl):'—',icon:'calc',col:'var(--coral)',bg:'var(--coral-soft)'},
 ];
 const manual=(t.kpis||[]).map(k=>({l:k.label,v:k.value,icon:k.icon||'star',col:'var(--purple)',bg:'var(--purple-soft)',manual:k.id}));
 const all=auto.concat(manual);
 const cards=all.map(k=>`<div class="kpi"><div class="kpi-ico" style="background:${k.bg};color:${k.col}">${svg(k.icon)}</div>
   <div class="kpi-v">${esc(k.v)}</div><div class="kpi-l">${esc(k.l)}</div>
   ${k.manual?`<button class="btn-icon" data-delkpi="${k.manual}" style="position:absolute;top:8px;inset-inline-end:8px;padding:4px;color:var(--muted-2)">${svg('x')}</button>`:''}</div>`).join('');
 root.innerHTML=`<div class="kpi-grid">${cards}</div>
   <div class="tbar"><div class="grow"></div><button class="btn btn-sm" id="addKpi">${svg('plus')}KPI يدوي</button></div>
   <div class="section-block"><div class="section-head"><h3>${svg('note')} أهم الملاحظات</h3></div>
     <div class="section-body"><textarea class="input" id="dashNote" placeholder="اكتبي هنا ملخص الأداء، أهم الملاحظات، أو خطة الفترة الجاية... بيتحفظ تلقائيًا.">${esc(t.note||'')}</textarea></div></div>`;
 const ta=$('#dashNote');ta.oninput=debounce(()=>{t.note=ta.value;touch(c);save();},400);
 root.querySelectorAll('[data-delkpi]').forEach(b=>b.onclick=()=>{t.kpis=(t.kpis||[]).filter(k=>k.id!==b.dataset.delkpi);touch(c);save();render();});
 $('#addKpi').onclick=()=>{
   modal({title:'KPI يدوي',sub:'رقم تتابعيه بنفسك',build(b){b.innerHTML='';
     const f1=makeInput({type:'text',name:'العنوان'},'');const f2=makeInput({type:'text',name:'القيمة'},'');
     b.appendChild(f1);b.appendChild(f2);b.__f1=f1;b.__f2=f2;setTimeout(()=>f1.querySelector('input').focus(),30);},
     footer:[{label:'إلغاء',onClick:closeModal},{label:'إضافة',primary:true,onClick:(b)=>{const l=b.__f1.__get(),v=b.__f2.__get();
       if(!l)return;t.kpis=t.kpis||[];t.kpis.push({id:uid(),label:l,value:v});touch(c);save();closeModal();render();}}]});
 };
}

const FIELD_TYPES=[{t:'text',n:'نص',icon:'edit'},{t:'longtext',n:'نص طويل',icon:'note'},{t:'number',n:'رقم',icon:'calc'},{t:'date',n:'تاريخ',icon:'cal'},{t:'dropdown',n:'قائمة اختيار',icon:'list'},{t:'status',n:'حالة',icon:'check'},{t:'link',n:'رابط',icon:'link'},{t:'tags',n:'تاغات',icon:'tag'}];

function renderTable(root,c,t){
 const u=tabUI(t.id);
 root.innerHTML=`<div class="tbar">
   <div class="mini-search">${svg('search')}<input id="tSearch" placeholder="بحث..." value="${esc(u.search)}"></div>
   <select class="filter-sel" id="tFilter"><option value="">كل الحالات</option></select>
   <button class="btn btn-sm" id="tArch">${svg('archive')}${u.showArch?'إخفاء الأرشيف':'عرض الأرشيف'}</button>

/* ---------- CSV import ---------- */
function importCsv(c,t){
 const inp=document.createElement('input');inp.type='file';inp.accept='.csv,text/csv';
 inp.onchange=()=>{const file=inp.files[0];if(!file)return;const rd=new FileReader();
   rd.onload=()=>{try{const rows=parseCSV(rd.result);if(rows.length<2)return toast('الملف فاضي',false);
     const headers=rows[0].map(h=>h.trim());
     // map headers → field by name (loose) else keep as text field
     const map=headers.map(h=>{let f=t.fields.find(ff=>ff.name.trim()===h||ff.id===h);if(!f){f={id:uid(),name:h,type:'text'};t.fields.push(f);}return f;});
     let added=0;rows.slice(1).forEach(r=>{if(!r.length||r.every(x=>!String(x).trim()))return;const v={};map.forEach((f,i)=>{let cell=(r[i]||'').trim();if(!cell)return;if(f.type==='number')cell=num(cell);if(f.type==='tags')cell=cell.split(/[،,]/).map(s=>s.trim()).filter(Boolean);v[f.id]=cell;});t.rows.unshift(newRow(v));added++;});
     touch(c);save();toast(`اتضاف ${added} صف من CSV ✅`);renderRows(c,t);
   }catch(err){toast('مش قادرة أقرأ الملف',false);}};
   rd.readAsText(file,'utf-8');};
 inp.click();
}
function parseCSV(txt){const rows=[];let i=0,field='',row=[],q=false;txt=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
 while(i<txt.length){const ch=txt[i];
   if(q){if(ch==='"'){if(txt[i+1]==='"'){field+='"';i+=2;continue;}q=false;i++;continue;}field+=ch;i++;continue;}
   if(ch==='"'){q=true;i++;continue;}
   if(ch===','){row.push(field);field='';i++;continue;}
   if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
   field+=ch;i++;}
 if(field.length||row.length){row.push(field);rows.push(row);}return rows;}

   const rec=box.querySelector('[data-rec]');if(rec)rec.oninput=debounce(()=>{r.recommendations=rec.value;touch(c);save();},400);
 });

function computeReport(c,monthLabel){
 const ct=campaignTab(c);const camps=ct?ct.rows.filter(r=>!r.archived):[];
 const budget=camps.reduce((s,r)=>s+num(r.values.budget),0);
 const leads=camps.reduce((s,r)=>s+num(r.values.leads),0);
 const sales=camps.reduce((s,r)=>s+num(r.values.sales),0);
 const cpl=leads?Math.round(budget/leads):0;
 const withCpl=camps.map(r=>({name:r.values.name||'حملة',cpl:num(r.values.cpl)||(num(r.values.leads)?Math.round(num(r.values.budget)/num(r.values.leads)):0),leads:num(r.values.leads),budget:num(r.values.budget),platform:r.values.platform})).filter(x=>x.leads>0);
 let best=null,worst=null;
 if(withCpl.length){best=withCpl.reduce((a,b)=>a.cpl<=b.cpl?a:b);worst=withCpl.reduce((a,b)=>a.cpl>=b.cpl?a:b);}
 return{id:uid(),month:monthLabel,createdAt:Date.now(),budget,leads,sales,cpl,campaigns:camps.length,
   best:best?{name:best.name,cpl:best.cpl,leads:best.leads,platform:best.platform}:null,
   worst:worst&&withCpl.length>1?{name:worst.name,cpl:worst.cpl,leads:worst.leads,platform:worst.platform}:null,
   recommendations:''};
}

/* ============================================================
   TAB DRAG & DROP
   ============================================================ */
function wireTabDnD(bar,c){
 let dragId=null;
 bar.querySelectorAll('.tab-chip').forEach(chip=>{
   chip.addEventListener('dragstart',e=>{dragId=chip.dataset.tab;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
   chip.addEventListener('dragend',()=>{dragId=null;chip.classList.remove('dragging');bar.querySelectorAll('.tab-chip').forEach(x=>x.classList.remove('drop-target'));});
   chip.addEventListener('dragover',e=>{e.preventDefault();if(chip.dataset.tab!==dragId)chip.classList.add('drop-target');});
   chip.addEventListener('dragleave',()=>chip.classList.remove('drop-target'));
   chip.addEventListener('drop',e=>{e.preventDefault();chip.classList.remove('drop-target');
     if(!dragId||dragId===chip.dataset.tab)return;
     const from=c.tabs.findIndex(t=>t.id===dragId),to=c.tabs.findIndex(t=>t.id===chip.dataset.tab);
     const[m]=c.tabs.splice(from,1);c.tabs.splice(to,0,m);touch(c);save();render();});
 });
}

   else if(kind==='task'){const t=c.tabs.find(t=>t.type==='table'&&t.fields.some(f=>f.id==='priority'))||c.tabs.find(t=>t.type==='table');if(!t)return;App.tabId=t.id;render();rowPanel(c,t,null);}
   else if(kind==='lead'){const t=leadTab(c)||c.tabs.find(t=>t.type==='table');if(!t)return;App.tabId=t.id;render();rowPanel(c,t,null);}
   else if(kind==='link'){let t=c.tabs.find(t=>t.type==='links');if(!t){t={id:uid(),name:'اللينكات',type:'links',icon:'link',links:[]};c.tabs.push(t);}App.tabId=t.id;render();linkPanel(c,t,null);}
   else if(kind==='note'){let t=c.tabs.find(t=>t.type==='notes');if(!t){t={id:uid(),name:'ملاحظات',type:'notes',icon:'note',notes:[]};c.tabs.push(t);}App.tabId=t.id;render();notePanel(c,t,null);}
 });
}

/* ============================================================
   GLOBAL SEARCH
   ============================================================ */
function globalSearch(q){
 closeGSearch();q=(q||'').trim().toLowerCase();if(!q)return;
 const res=[];
 DB().companies.filter(c=>!c.archived).forEach(c=>{
   if(c.name.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q)))res.push({type:'برنامج',co:c,label:c.name,sub:'فتح البرنامج',go:()=>openCompany(c.id)});
   c.tabs.forEach(t=>{
     (t.rows||[]).filter(r=>!r.archived).forEach(r=>{const hit=t.fields.some(f=>{const v=r.values[f.id];return v!=null&&String(Array.isArray(v)?v.join(' '):v).toLowerCase().includes(q);});
       if(hit){const nameField=t.fields[0];res.push({type:t.name,co:c,label:r.values[nameField.id]||'صف',sub:c.name,go:()=>{openCompany(c.id);App.tabId=t.id;render();rowPanel(c,t,r);}});}});
     (t.links||[]).filter(l=>!l.archived).forEach(l=>{if((l.title+l.url+(l.note||'')).toLowerCase().includes(q))res.push({type:'لينك',co:c,label:l.title,sub:c.name,go:()=>{openCompany(c.id);App.tabId=t.id;render();}});});
     (t.notes||[]).filter(n=>!n.archived).forEach(n=>{if(((n.title||'')+(n.body||'')).toLowerCase().includes(q))res.push({type:'ملاحظة',co:c,label:n.title||(n.body||'').slice(0,30),sub:c.name,go:()=>{openCompany(c.id);App.tabId=t.id;render();}});});
   });
 });
 const box=document.createElement('div');box.className='gsr';box.id='gsrBox';
 if(!res.length)box.innerHTML=`<div class="gsr-item" style="cursor:default"><div class="gsr-main"><div class="gsr-t">مفيش نتائج لـ "${esc(q)}"</div></div></div>`;
 else{const groups={};res.slice(0,40).forEach(r=>{(groups[r.type]=groups[r.type]||[]).push(r);});
   box.innerHTML=Object.entries(groups).map(([g,items])=>`<div class="gsr-group-h">${esc(g)}</div>`+items.map((r,i)=>`<div class="gsr-item" data-gi="${res.indexOf(r)}"><div class="gsr-ico" style="background:${r.co.color}22;color:${r.co.color}">${svg('search')}</div><div class="gsr-main"><div class="gsr-t">${esc(r.label)}</div><div class="gsr-s">${esc(r.sub)}</div></div></div>`).join('')).join('');}
 const gs=$('.gsearch');gs.appendChild(box);
 box.querySelectorAll('[data-gi]').forEach(el=>el.onclick=()=>{const r=res[+el.dataset.gi];closeGSearch();$('#gSearch').value='';r.go();});
 setTimeout(()=>document.addEventListener('mousedown',gsOutside),0);
}
function gsOutside(e){if(!e.target.closest('.gsearch'))closeGSearch();}
function closeGSearch(){const b=$('#gsrBox');if(b)b.remove();document.removeEventListener('mousedown',gsOutside);}

function confirmDelete(title,sub,onYes){
 modal({title,sub,build(b){b.innerHTML='';},footer:[{label:'إلغاء',onClick:closeModal},{label:'حذف',danger:true,onClick:()=>{closeModal();onYes();}}]});
}
